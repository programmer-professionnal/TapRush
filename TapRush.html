<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TapRush - Clicker Game</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Orbitron', sans-serif;
            background: linear-gradient(135deg, #0a0f1a 0%, #141e30 50%, #0a0f1a 100%);
            color: #fff;
            min-height: 100vh;
            overflow: hidden;
            user-select: none;
        }
        
        #game-container {
            display: flex;
            height: 100vh;
        }
        
        #game-area {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            background: radial-gradient(ellipse at center, #1a2538 0%, #0d1117 100%);
        }
        
        #header {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 80px;
            background: linear-gradient(180deg, rgba(10,15,26,0.95) 0%, rgba(10,15,26,0) 100%);
            display: flex;
            align-items: center;
            padding: 0 30px;
            gap: 30px;
            z-index: 10;
        }
        
        #title {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(90deg, #4a90d9, #00d4ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(74,144,217,0.5);
        }
        
        .stat {
            font-size: 24px;
            font-weight: 700;
        }
        
        .stat-value {
            color: #00d4ff;
            font-size: 32px;
        }
        
        #score-display {
            font-size: 48px;
            font-weight: 900;
            color: #fff;
        }
        
        #clicker {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, #4a90d9, #1a5070);
            border: 4px solid #00d4ff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            font-weight: 900;
            transition: all 0.1s;
            box-shadow: 0 0 50px rgba(0,212,255,0.3), inset 0 0 30px rgba(0,0,0,0.3);
            position: relative;
            z-index: 5;
        }
        
        #clicker:active {
            transform: scale(0.95);
            box-shadow: 0 0 30px rgba(0,212,255,0.5);
        }
        
        #clicker::before {
            content: '';
            position: absolute;
            width: 120%;
            height: 120%;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(0,212,255,0.1) 0%, transparent 70%);
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }
        
        #click-value {
            position: absolute;
            top: -60px;
            font-size: 28px;
            font-weight: 700;
            color: #ffd700;
        }
        
        #combo {
            position: absolute;
            top: 30px;
            right: 30px;
            font-size: 24px;
            font-weight: 700;
            color: #ff6b35;
        }
        
        #sidebar {
            width: 350px;
            background: linear-gradient(180deg, #0d1117 0%, #141e30 100%);
            display: flex;
            flex-direction: column;
            border-left: 2px solid #1a2538;
        }
        
        #tabs {
            display: flex;
            border-bottom: 2px solid #1a2538;
        }
        
        .tab {
            flex: 1;
            padding: 15px 10px;
            text-align: center;
            cursor: pointer;
            font-size: 12px;
            font-weight: 700;
            background: #0d1117;
            color: #666;
            transition: all 0.3s;
            border: none;
            outline: none;
        }
        
        .tab:hover {
            background: #141e30;
            color: #00d4ff;
        }
        
        .tab.active {
            background: #141e30;
            color: #00d4ff;
            border-bottom: 3px solid #00d4ff;
        }
        
        #tab-content {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }
        
        .section-title {
            font-size: 14px;
            font-weight: 700;
            color: #ffd700;
            margin-bottom: 10px;
            padding-bottom: 5px;
            border-bottom: 1px solid #333;
        }
        
        .upgrade-item, .mission-item, .achievement-item, .powerup-item, .theme-item {
            background: linear-gradient(135deg, #1a2538 0%, #0d1117 100%);
            border: 1px solid #2a3a50;
            border-radius: 8px;
            padding: 12px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .upgrade-item:hover, .mission-item:hover {
            border-color: #00d4ff;
            transform: translateX(5px);
        }
        
        .upgrade-item.disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .upgrade-name {
            font-size: 14px;
            font-weight: 700;
            color: #00d4ff;
        }
        
        .upgrade-cost {
            font-size: 12px;
            color: #ff6b35;
            float: right;
        }
        
        .upgrade-effect {
            font-size: 11px;
            color: #666;
            margin-top: 5px;
        }
        
        #level-bar {
            position: absolute;
            bottom: 30px;
            left: 30px;
            width: 200px;
        }
        
        #level-bar-fill {
            height: 10px;
            background: linear-gradient(90deg, #00d4ff, #4a90d9);
            border-radius: 5px;
            transition: width 0.3s;
        }
        
        #energy-bar {
            position: absolute;
            bottom: 30px;
            right: 30px;
            width: 200px;
        }
        
        #energy-fill {
            height: 10px;
            background: linear-gradient(90deg, #00ff88, #00d4ff);
            border-radius: 5px;
            transition: width 0.3s;
        }
        
        .floating-text {
            position: absolute;
            font-size: 24px;
            font-weight: 700;
            pointer-events: none;
            animation: floatUp 1s ease-out forwards;
        }
        
        @keyframes floatUp {
            0% { opacity: 1; transform: translateY(0); }
            100% { opacity: 0; transform: translateY(-50px); }
        }
        
        .achievement-notification {
            position: fixed;
            top: 20px;
            right: 20px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #000;
            padding: 15px 25px;
            border-radius: 10px;
            font-weight: 700;
            animation: slideIn 0.5s, fadeOut 0.5s 2.5s forwards;
            z-index: 100;
        }
        
        @keyframes slideIn {
            from { transform: translateX(100%); }
            to { transform: translateX(0); }
        }
        
        @keyframes fadeOut {
            to { opacity: 0; transform: translateX(100%); }
        }
        
        #event-banner {
            position: absolute;
            top: 100px;
            background: linear-gradient(90deg, #ff6b35, #ff0000);
            color: #fff;
            padding: 10px 30px;
            font-weight: 700;
            border-radius: 25px;
            animation: pulse 1s infinite;
            display: none;
        }
        
        #prestige-btn {
            position: absolute;
            bottom: 60px;
            left: 30px;
            background: linear-gradient(135deg, #ffd700, #ff8c00);
            color: #000;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
        }
        
        #streak-display {
            position: absolute;
            bottom: 60px;
            right: 30px;
            font-size: 14px;
            color: #ff6b35;
        }
        
        .progress-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }
        
        .completed {
            border-color: #00ff88 !important;
        }
        
        .achievement-unlocked {
            background: linear-gradient(135deg, #2a4a30 0%, #1a3020 100%) !important;
            border-color: #00ff88 !important;
        }
        
        .mission-progress {
            font-size: 11px;
            color: #00d4ff;
            margin-top: 3px;
        }
        
        #daily-missions, #weekly-missions {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #2a3a50;
        }
        
        .section-title {
            font-size: 14px;
            color: #00d4ff;
            margin-bottom: 10px;
            font-weight: 700;
        }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="game-area">
            <div id="header">
                <div id="title">TAPRUSH</div>
                <div>
                    <div class="stat-value" id="score-display">0</div>
                </div>
            </div>
            
            <div id="combo">Combo: x0</div>
            
            <div id="clicker">
                <div id="click-value">+1</div>
                TAP!
            </div>
            
            <div id="event-banner">EVENTO!</div>
            
            <div id="prestige-btn">Prestigio</div>
            <div id="streak-display">Racha: 0 días (x1)</div>
            
            <div id="level-bar">
                <div class="stat">Nivel <span id="level">1</span></div>
                <div id="level-bar-fill" style="width: 0%"></div>
                <div class="progress-text">XP: <span id="xp">0</span>/1000</div>
            </div>
            
            <div id="energy-bar">
                <div class="stat">Energía</div>
                <div id="energy-fill" style="width: 100%"></div>
                <div class="progress-text"><span id="energy">500</span>/500</div>
            </div>
        </div>
        
        <div id="sidebar">
            <div id="tabs">
                <button class="tab active" data-tab="upgrades">MEJORAS</button>
                <button class="tab" data-tab="missions">MISIONES</button>
                <button class="tab" data-tab="achievements">LOGROS</button>
                <button class="tab" data-tab="powerups">POWER-UPS</button>
                <button class="tab" data-tab="challenges">DESAFÍOS</button>
                <button class="tab" data-tab="stats">STATS</button>
                <button class="tab" data-tab="themes">TEMAS</button>
            </div>
            
            <div id="tab-content"></div>
        </div>
    </div>

    <script>
        // ==================== GAME DATA ====================
        const upgrades = [
            { name: "Cursor", cost: 15, cps: -1, count: 0 },
            { name: "Auto Clicker", cost: 100, cps: 1, count: 0 },
            { name: "Grandma", cost: 500, cps: 3, count: 0 },
            { name: "Farm", cost: 2000, cps: 10, count: 0 },
            { name: "Mine", cost: 10000, cps: 40, count: 0 },
            { name: "Factory", cost: 50000, cps: 150, count: 0 },
            { name: "Temple", cost: 250000, cps: 500, count: 0 },
            { name: "Magic Portal", cost: 1000000, cps: 2000, count: 0 },
            { name: "Quantum Core", cost: 5000000, cps: 10000, count: 0 },
            { name: "Alien Tech", cost: 25000000, cps: 50000, count: 0 }
        ];
        
        const missions = [
            { name: "Click 100", target: 100, progress: 0, completed: false, reward: 50 },
            { name: "Click 500", target: 500, progress: 0, completed: false, reward: 150 },
            { name: "Click 1K", target: 1000, progress: 0, completed: false, reward: 300 },
            { name: "Click 5K", target: 5000, progress: 0, completed: false, reward: 1000 },
            { name: "Click 10K", target: 10000, progress: 0, completed: false, reward: 2000 },
            { name: "Puntos 1K", target: 1000, progress: 0, completed: false, reward: 100 },
            { name: "Puntos 10K", target: 10000, progress: 0, completed: false, reward: 500 },
            { name: "Puntos 100K", target: 100000, progress: 0, completed: false, reward: 2000 },
            { name: "Combo x5", target: 5, progress: 0, completed: false, reward: 50 },
            { name: "Combo x10", target: 10, progress: 0, completed: false, reward: 100 }
        ];
        
        const dailyMissions = [
            { name: "Daily: 100 Clics", target: 100, progress: 0, completed: false, reward: 50 },
            { name: "Daily: 500 Clics", target: 500, progress: 0, completed: false, reward: 150 },
            { name: "Daily: 1000 Pts", target: 1000, progress: 0, completed: false, reward: 200 },
            { name: "Daily: 5000 Pts", target: 5000, progress: 0, completed: false, reward: 500 },
            { name: "Daily: 10 CPS", target: 10, progress: 0, completed: false, reward: 300 },
            { name: "Daily: 50 CPS", target: 50, progress: 0, completed: false, reward: 1000 }
        ];
        
        const achievements = [
            { name: "Principiante", desc: "100 clics", unlocked: false },
            { name: "Aprendiz", desc: "500 clics", unlocked: false },
            { name: "Intermedio", desc: "1000 clics", unlocked: false },
            { name: "Avanzado", desc: "5000 clics", unlocked: false },
            { name: "Experto", desc: "10000 clics", unlocked: false },
            { name: "Maestro Clicker", desc: "50000 clics", unlocked: false },
            { name: "Leyenda", desc: "100000 clics", unlocked: false },
            { name: "Primera Compra", desc: "Comprar 1 mejora", unlocked: false },
            { name: "Comprador", desc: "Comprar 5 mejoras", unlocked: false },
            { name: "Coleccionista", desc: "Comprar 10 mejoras", unlocked: false },
            { name: "Magnate", desc: "Comprar 25 mejoras", unlocked: false },
            { name: "Combo x3", desc: "Alcanza combo x3", unlocked: false },
            { name: "Combo x5", desc: "Alcanza combo x5", unlocked: false },
            { name: "Combo x10", desc: "Alcanza combo x10", unlocked: false },
            { name: "Combo x25", desc: "Alcanza combo x25", unlocked: false },
            { name: "Nivel 5", desc: "Alcanza nivel 5", unlocked: false },
            { name: "Nivel 10", desc: "Alcanza nivel 10", unlocked: false },
            { name: "Nivel 25", desc: "Alcanza nivel 25", unlocked: false },
            { name: "Productor", desc: "10 CPS", unlocked: false },
            { name: "Productor Avanzado", desc: "100 CPS", unlocked: false },
            { name: "Novato", desc: "1K puntos", unlocked: false },
            { name: "Estudiante", desc: "10K puntos", unlocked: false },
            { name: "Graduado", desc: "100K puntos", unlocked: false },
            { name: "Evento", desc: "Activar un evento", unlocked: false },
            { name: "Premio", desc: "Primer Prestigio", unlocked: false }
        ];
        
        const ranks = [
            { name: "Hierro", color: "#8b8b8b", minScore: 0, bonus: 1.0 },
            { name: "Bronce", color: "#cd7f32", minScore: 1000, bonus: 1.1 },
            { name: "Plata", color: "#c0c0c0", minScore: 10000, bonus: 1.2 },
            { name: "Oro", color: "#ffd700", minScore: 100000, bonus: 1.3 },
            { name: "Platino", color: "#00d4ff", minScore: 1000000, bonus: 1.5 },
            { name: "Diamante", color: "#b9f2ff", minScore: 10000000, bonus: 2.0 }
        ];
        
        const powerups = [
            { name: "Doble Click", cost: 500, duration: 60, mult: 2, active: false, timer: 0 },
            { name: "Energía Extra", cost: 300, duration: 0, energyBonus: 500, active: false, timer: 0 },
            { name: "Combo Turbo", cost: 400, duration: 30, mult: 3, active: false, timer: 0 },
            { name: "Click Dorado", cost: 1000, duration: 45, mult: 5, active: false, timer: 0 }
        ];
        
        const dailyChallenges = [
            { name: "Click 200 Veces", target: 200, type: "clicks", progress: 0, completed: false, reward: 1000 },
            { name: "Alcanza 5K Puntos", target: 5000, type: "score", progress: 0, completed: false, reward: 2000 },
            { name: "50 CPS Mínimo", target: 50, type: "cps", progress: 0, completed: false, reward: 3000 }
        ];
        
        const hiddenAchievements = [
            { name: "???", desc: "Encuentra el secreto", unlocked: false, secret: "click100times", progress: 0 },
            { name: "???", desc: "Otro secreto", unlocked: false, secret: "buy10upgrades", progress: 0 },
            { name: "???", desc: "Y más secretos", unlocked: false, secret: "reachRank5", progress: 0 }
        ];
        
        const themes = {
            default: { bg: "linear-gradient(135deg, #0a0f1a 0%, #141e30 50%, #0a0f1a 100%)", accent: "#00d4ff", name: "Neón Azul" },
            purple: { bg: "linear-gradient(135deg, #1a0a2e 0%, #2d1b4e 50%, #1a0a2e 100%)", accent: "#9b59b6", name: "Púrpura Místico" },
            green: { bg: "linear-gradient(135deg, #0a1a0a 0%, #1b3d1b 50%, #0a1a0a 100%)", accent: "#27ae60", name: "Naturaleza" },
            red: { bg: "linear-gradient(135deg, #1a0a0a 0%, #3d1b1b 50%, #1a0a0a 100%)", accent: "#e74c3c", name: "Fuego" },
            gold: { bg: "linear-gradient(135deg, #1a1500 0%, #3d3000 50%, #1a1500 100%)", accent: "#f1c40f", name: "Oro" }
        };
        
        const easterEggs = {
            konami: { sequence: [38,38,40,40,37,39,37,39,66,65], progress: 0, found: false },
            click500: { count: 0, found: false },
            buyAll: { count: 0, found: false }
        };
        
        // ==================== GAME STATE ====================
        let game = {
            score: 0,
            totalClicks: 0,
            level: 1,
            xp: 0,
            combo: 0,
            comboTimer: 0,
            energy: 1500,
            maxEnergy: 1500,
            energyTimer: 0,
            prestige: 0,
            prestigeMult: 1,
            streak: 0,
            streakMult: 1,
            activeEvent: null,
            eventTimer: 0,
            eventActive: false,
            specialEvent: null,
            specialTimer: 0,
            specialActive: false,
            currentRank: 0,
            currentTheme: 'default',
            wheelSpins: 1,
            lastWheelDay: null,
            stats: { bestCombo: 0, totalPlaytime: 0, upgradesBought: 0 }
        };
        
        function getRank() {
            let rank = ranks[0];
            for (let r of ranks) {
                if (game.score >= r.minScore) rank = r;
            }
            return rank;
        }
        
        function getTotalMult() {
            return game.prestigeMult * game.streakMult * getRank().bonus;
        }
        
        // ==================== HELPERS ====================
        function formatNumber(num) {
            if (num >= 1e12) return (num / 1e12).toFixed(1) + 'T';
            if (num >= 1e9) return (num / 1e9).toFixed(1) + 'B';
            if (num >= 1e6) return (num / 1e6).toFixed(1) + 'M';
            if (num >= 1e3) return (num / 1e3).toFixed(1) + 'K';
            return Math.floor(num).toString();
        }
        
        function getClickValue() {
            let base = 1;
            for (let up of upgrades) {
                if (up.cps < 0) base += up.count;
            }
            if (game.eventActive) base *= game.activeEvent.multiplier;
            let mult = game.prestigeMult * game.streakMult * getRank().bonus;
            if (powerups[0].active) mult *= powerups[0].mult;
            if (powerups[3].active) mult *= powerups[3].mult;
            return Math.floor(base * mult);
        }
        
        function getCPS() {
            let cps = 0;
            for (let up of upgrades) {
                if (up.cps > 0) cps += up.count * up.cps;
            }
            if (game.eventActive) cps *= game.activeEvent.multiplier;
            let mult = game.prestigeMult * getRank().bonus;
            if (powerups[0].active) mult *= powerups[0].mult;
            if (powerups[3].active) mult *= powerups[3].mult;
            return cps * mult;
        }
        
        function getLevelXP(level) {
            return level * 1000;
        }
        
        // ==================== SAVE/LOAD ====================
        function saveGame() {
            const data = {
                score: game.score,
                totalClicks: game.totalClicks,
                level: game.level,
                xp: game.xp,
                upgrades: upgrades.map(u => u.count),
                prestige: game.prestige,
                streak: game.streak,
                achievements: achievements.map(a => a.unlocked),
                missions: missions.map(m => m.progress),
                dailyMissions: dailyMissions.map(m => m.progress),
                dailyChallenges: dailyChallenges.map(c => c.progress),
                powerups: powerups.map(p => ({ active: p.active, timer: p.timer })),
                hiddenAchievements: hiddenAchievements.map(h => h.unlocked),
                currentTheme: game.currentTheme,
                wheelSpins: game.wheelSpins,
                lastWheelDay: game.lastWheelDay,
                stats: game.stats
            };
            localStorage.setItem('taprush_save', JSON.stringify(data));
        }
        
        function loadGame() {
            const saved = localStorage.getItem('taprush_save');
            if (saved) {
                try {
                    const data = JSON.parse(saved);
                    game.score = data.score || 0;
                    game.totalClicks = data.totalClicks || 0;
                    game.level = data.level || 1;
                    game.xp = data.xp || 0;
                    game.prestige = data.prestige || 0;
                    game.streak = data.streak || 0;
                    game.prestigeMult = 1 + (game.prestige * 0.1);
                    game.streakMult = Math.min(7, Math.max(1, game.streak));
                    game.currentTheme = data.currentTheme || 'default';
                    game.wheelSpins = data.wheelSpins || 1;
                    game.lastWheelDay = data.lastWheelDay || null;
                    game.stats = data.stats || { bestCombo: 0, totalPlaytime: 0, upgradesBought: 0 };
                    
                    if (data.upgrades) {
                        data.upgrades.forEach((count, i) => {
                            if (upgrades[i]) upgrades[i].count = count;
                        });
                    }
                    if (data.achievements) {
                        data.achievements.forEach((unlocked, i) => {
                            if (achievements[i]) achievements[i].unlocked = unlocked;
                        });
                    }
                    if (data.missions) {
                        data.missions.forEach((progress, i) => {
                            if (missions[i]) missions[i].progress = progress;
                        });
                    }
                    if (data.dailyMissions) {
                        data.dailyMissions.forEach((progress, i) => {
                            if (dailyMissions[i]) dailyMissions[i].progress = progress;
                        });
                    }
                    if (data.dailyChallenges) {
                        data.dailyChallenges.forEach((progress, i) => {
                            if (dailyChallenges[i]) dailyChallenges[i].progress = progress;
                        });
                    }
                    if (data.powerups) {
                        data.powerups.forEach((p, i) => {
                            if (powerups[i]) { powerups[i].active = p.active; powerups[i].timer = p.timer; }
                        });
                    }
                    if (data.hiddenAchievements) {
                        data.hiddenAchievements.forEach((unlocked, i) => {
                            if (hiddenAchievements[i]) hiddenAchievements[i].unlocked = unlocked;
                        });
                    }
                } catch (e) {
                    console.log('Error loading save:', e);
                }
            }
        }
        
        // ==================== CHECKS ====================
        function checkLevel() {
            let xpNeeded = getLevelXP(game.level);
            while (game.xp >= xpNeeded) {
                game.xp -= xpNeeded;
                game.level++;
                xpNeeded = getLevelXP(game.level);
                showFloatingText('¡NIVEL ' + game.level + '!', '#ffd700');
            }
        }
        
        function checkMissions() {
            // Permanent missions
            missions.forEach(m => {
                if (!m.completed) {
                    m.progress = game.totalClicks;
                    if (m.progress >= m.target) {
                        m.completed = true;
                        game.score += m.reward;
                        showFloatingText('¡Misión!: ' + m.name, '#00ff88');
                    }
                }
            });
            
            // Daily missions
            dailyMissions.forEach(m => {
                if (!m.completed) {
                    m.progress = game.totalClicks;
                    if (m.progress >= m.target) {
                        m.completed = true;
                        game.score += m.reward;
                        showFloatingText('¡Misión Diaria!: ' + m.name, '#00ff88');
                    }
                }
            });
        }
        
        function checkAchievements() {
            let totalUpgrades = upgrades.reduce((sum, u) => sum + u.count, 0);
            
            const checks = [
                { i: 0, cond: game.totalClicks >= 100 },
                { i: 1, cond: game.totalClicks >= 500 },
                { i: 2, cond: game.totalClicks >= 1000 },
                { i: 3, cond: game.totalClicks >= 5000 },
                { i: 4, cond: game.totalClicks >= 10000 },
                { i: 5, cond: game.totalClicks >= 50000 },
                { i: 6, cond: game.totalClicks >= 100000 },
                { i: 7, cond: totalUpgrades >= 1 },
                { i: 8, cond: totalUpgrades >= 5 },
                { i: 9, cond: totalUpgrades >= 10 },
                { i: 10, cond: totalUpgrades >= 25 },
                { i: 11, cond: game.combo >= 3 },
                { i: 12, cond: game.combo >= 5 },
                { i: 13, cond: game.combo >= 10 },
                { i: 14, cond: game.combo >= 25 },
                { i: 15, cond: game.level >= 5 },
                { i: 16, cond: game.level >= 10 },
                { i: 17, cond: game.level >= 25 },
                { i: 18, cond: getCPS() >= 10 },
                { i: 19, cond: getCPS() >= 100 },
                { i: 20, cond: game.score >= 1000 },
                { i: 21, cond: game.score >= 10000 },
                { i: 22, cond: game.score >= 100000 },
                { i: 23, cond: game.eventActive }
            ];
            
            checks.forEach(check => {
                if (check.cond && !achievements[check.i].unlocked) {
                    achievements[check.i].unlocked = true;
                    showAchievement(achievements[check.i].name);
                }
            });
        }
        
        // ==================== UI ====================
        function updateUI() {
            const rank = getRank();
            document.getElementById('score-display').textContent = formatNumber(game.score);
            document.getElementById('combo').textContent = 'Combo: x' + game.combo;
            document.getElementById('click-value').textContent = '+' + formatNumber(getClickValue());
            document.getElementById('level').textContent = game.level;
            document.getElementById('xp').textContent = formatNumber(game.xp) + '/' + formatNumber(getLevelXP(game.level));
            document.getElementById('level-bar-fill').style.width = (game.xp / getLevelXP(game.level) * 100) + '%';
            document.getElementById('energy').textContent = game.energy;
            document.getElementById('energy-fill').style.width = (game.energy / game.maxEnergy * 100) + '%';
            document.getElementById('streak-display').textContent = 'Racha: ' + game.streak + ' días (x' + game.streakMult + ')';
            
            let rankEl = document.getElementById('rank-display');
            if (!rankEl) {
                rankEl = document.createElement('span');
                rankEl.id = 'rank-display';
                document.getElementById('streak-display').after(rankEl);
            }
            rankEl.textContent = ' | Rango: ' + rank.name + ' (x' + rank.bonus.toFixed(1) + ')';
            rankEl.style.color = rank.color;
            
            let cpsEl = document.getElementById('cps-display');
            if (!cpsEl) {
                cpsEl = document.createElement('span');
                cpsEl.id = 'cps-display';
                document.getElementById('click-value').before(cpsEl);
            }
            cpsEl.textContent = formatNumber(getCPS()) + '/s | ';
        }
        
        function showUpgrades() {
            let html = '';
            upgrades.forEach((up, i) => {
                let canAfford = game.score >= up.cost;
                html += `
                    <div class="upgrade-item ${canAfford ? '' : 'disabled'}" data-upgrade="${i}">
                        <span class="upgrade-name">${up.name} (${up.count})</span>
                        <span class="upgrade-cost">${formatNumber(up.cost)}</span>
                        <div class="upgrade-effect">${up.cps < 0 ? '+1/click' : '+' + formatNumber(up.cps * game.prestigeMult) + '/s'}</div>
                    </div>
                `;
            });
            document.getElementById('tab-content').innerHTML = html;
        }
        
        function showMissions() {
            let html = '<div class="section-title">MISIONES PERMANENTES</div>';
            missions.forEach(m => {
                html += `
                    <div class="mission-item ${m.completed ? 'completed' : ''}">
                        <span class="upgrade-name">${m.name}</span>
                        <span class="upgrade-cost">+${formatNumber(m.reward)}</span>
                        <div class="mission-progress">${m.progress}/${m.target} (${Math.min(100, Math.floor(m.progress / m.target * 100))}%)</div>
                    </div>
                `;
            });
            
            html += '<div class="section-title" style="margin-top:15px">MISIONES DIARIAS</div>';
            dailyMissions.forEach(m => {
                html += `
                    <div class="mission-item ${m.completed ? 'completed' : ''}">
                        <span class="upgrade-name">${m.name}</span>
                        <span class="upgrade-cost">+${formatNumber(m.reward)}</span>
                        <div class="mission-progress">${m.progress}/${m.target}</div>
                    </div>
                `;
            });
            
            document.getElementById('tab-content').innerHTML = html;
        }
        
        function showAchievements() {
            let html = '<div class="section-title">LOGROS</div>';
            achievements.forEach(a => {
                html += `
                    <div class="achievement-item ${a.unlocked ? 'achievement-unlocked' : ''}">
                        <span class="upgrade-name">${a.unlocked ? '✓ ' : '○ '}${a.name}</span>
                        <div class="upgrade-effect">${a.desc}</div>
                    </div>
                `;
            });
            
            html += '<div class="section-title" style="margin-top:20px">LOGROS OCULTOS</div>';
            hiddenAchievements.forEach(h => {
                html += `
                    <div class="achievement-item ${h.unlocked ? 'achievement-unlocked' : ''}">
                        <span class="upgrade-name">${h.unlocked ? '★ ' : '? '}${h.name}</span>
                        <div class="upgrade-effect">${h.desc}</div>
                    </div>
                `;
            });
            
            document.getElementById('tab-content').innerHTML = html;
        }
        
        function showPowerups() {
            let html = '<div class="section-title">POWER-UPS</div><div style="text-align:center;margin-bottom:15px">Puntos: ' + formatNumber(game.score) + '</div>';
            powerups.forEach((p, i) => {
                const canAfford = game.score >= p.cost && !p.active;
                html += `
                    <div class="powerup-item ${canAfford ? '' : 'disabled'} ${p.active ? 'active' : ''}" data-powerup="${i}">
                        <span class="upgrade-name">${p.name}</span>
                        <span class="upgrade-cost">${p.active ? 'ACTIVO (' + Math.ceil(p.timer) + 's)' : formatNumber(p.cost)}</span>
                        <div class="upgrade-effect">${p.duration > 0 ? p.mult + 'x por ' + p.duration + 's' : '+' + p.energyBonus + ' energía'}</div>
                    </div>
                `;
            });
            
            html += '<div class="section-title" style="margin-top:20px">RUEDA DE LA FORTUNA</div>';
            const today = new Date().toDateString();
            if (game.lastWheelDay !== today && game.wheelSpins > 0) {
                html += `<div class="powerup-item" onclick="spinWheel()" style="cursor:pointer;text-align:center;font-size:20px">🎡 ¡GIRA LA RUEDA!</div>`;
            } else {
                html += `<div class="powerup-item disabled" style="text-align:center">${game.wheelSpins > 0 ? 'Ya giraste hoy' : 'Sin spins'}</div>`;
            }
            
            document.getElementById('tab-content').innerHTML = html;
        }
        
        function showChallenges() {
            let html = '<div class="section-title">DESAFÍOS DIARIOS</div>';
            dailyChallenges.forEach(c => {
                const pct = Math.min(100, Math.floor(c.progress / c.target * 100));
                html += `
                    <div class="mission-item ${c.completed ? 'completed' : ''}">
                        <span class="upgrade-name">${c.name}</span>
                        <span class="upgrade-cost">+${formatNumber(c.reward)}</span>
                        <div class="mission-progress">${formatNumber(c.progress)}/${c.target} (${pct}%)</div>
                    </div>
                `;
            });
            
            html += '<div class="section-title" style="margin-top:20px">RANGOS</div>';
            ranks.forEach(r => {
                const current = getRank().name === r.name;
                html += `
                    <div class="mission-item ${current ? 'completed' : ''}">
                        <span class="upgrade-name" style="color:${r.color}">${current ? '► ' : ''}${r.name}</span>
                        <span class="upgrade-cost">x${r.bonus}</span>
                        <div class="mission-progress">Desde ${formatNumber(r.minScore)} pts</div>
                    </div>
                `;
            });
            
            document.getElementById('tab-content').innerHTML = html;
        }
        
        function showStats() {
            const totalUpgrades = upgrades.reduce((sum, u) => sum + u.count, 0);
            let html = '<div class="section-title">ESTADÍSTICAS</div>';
            html += `
                <div class="mission-item"><span class="upgrade-name">Mejor Combo</span><span class="upgrade-cost">x${game.stats.bestCombo}</span></div>
                <div class="mission-item"><span class="upgrade-name">Total Clics</span><span class="upgrade-cost">${formatNumber(game.totalClicks)}</span></div>
                <div class="mission-item"><span class="upgrade-name">Total Upgrades</span><span class="upgrade-cost">${totalUpgrades}</span></div>
                <div class="mission-item"><span class="upgrade-name">Puntos/Segundo</span><span class="upgrade-cost">${formatNumber(getCPS())}</span></div>
                <div class="mission-item"><span class="upgrade-name">Nivel</span><span class="upgrade-cost">${game.level}</span></div>
                <div class="mission-item"><span class="upgrade-name">Prestigio</span><span class="upgrade-cost">${game.prestige}</span></div>
                <div class="mission-item"><span class="upgrade-name">Racha</span><span class="upgrade-cost">${game.streak} días</span></div>
            `;
            
            html += '<div class="section-title" style="margin-top:20px">ATAJOS DE TECLADO</div>';
            html += `
                <div class="mission-item"><span class="upgrade-name">Space</span><span class="upgrade-cost">Clickea</span></div>
                <div class="mission-item"><span class="upgrade-name">U</span><span class="upgrade-cost">Mejoras</span></div>
                <div class="mission-item"><span class="upgrade-name">M</span><span class="upgrade-cost">Misiones</span></div>
                <div class="mission-item"><span class="upgrade-name">A</span><span class="upgrade-cost">Logros</span></div>
                <div class="mission-item"><span class="upgrade-name">P</span><span class="upgrade-cost">Power-ups</span></div>
                <div class="mission-item"><span class="upgrade-name">D</span><span class="upgrade-cost">Desafíos</span></div>
                <div class="mission-item"><span class="upgrade-name">S</span><span class="upgrade-cost">Stats</span></div>
            `;
            
            document.getElementById('tab-content').innerHTML = html;
        }
        
        function showThemes() {
            let html = '<div class="section-title">TEMAS</div>';
            Object.entries(themes).forEach(([key, t]) => {
                html += `
                    <div class="theme-item ${game.currentTheme === key ? 'active' : ''}" data-theme="${key}" style="cursor:pointer;padding:10px;margin:5px 0;background:${t.bg};border:2px solid ${t.accent};border-radius:8px">
                        <span class="upgrade-name" style="color:${t.accent}">${t.name}</span>
                    </div>
                `;
            });
            document.getElementById('tab-content').innerHTML = html;
        }
        
        function activatePowerup(index) {
            const p = powerups[index];
            if (game.score >= p.cost && !p.active) {
                game.score -= p.cost;
                p.active = true;
                p.timer = p.duration;
                if (p.energyBonus) {
                    game.energy = Math.min(game.maxEnergy, game.energy + p.energyBonus);
                    showFloatingText('+' + p.energyBonus + ' ENERGÍA', '#00ff88');
                }
                showUpgrades();
            }
        }
        
        function spinWheel() {
            const rewards = [100, 500, 1000, 2500, 5000, 10000, 25000];
            const reward = rewards[Math.floor(Math.random() * rewards.length)];
            game.score += reward;
            game.wheelSpins--;
            game.lastWheelDay = new Date().toDateString();
            showFloatingText('+' + formatNumber(reward) + '!', '#ffd700');
            showPowerups();
        }
        
        function changeTheme(themeKey) {
            game.currentTheme = themeKey;
            const t = themes[themeKey];
            document.body.style.background = t.bg;
            document.getElementById('clicker').style.borderColor = t.accent;
            showThemes();
        }
        
        function showAchievement(name) {
            const notif = document.createElement('div');
            notif.className = 'achievement-notification';
            notif.textContent = '🏆 LOGRO: ' + name;
            document.body.appendChild(notif);
            setTimeout(() => notif.remove(), 3000);
        }
        
        function showFloatingText(text, color) {
            const clicker = document.getElementById('clicker');
            const rect = clicker.getBoundingClientRect();
            const el = document.createElement('div');
            el.className = 'floating-text';
            el.textContent = text;
            el.style.color = color || '#ffd700';
            el.style.left = (rect.left + rect.width/2 + (Math.random() - 0.5) * 100) + 'px';
            el.style.top = (rect.top + rect.height/2) + 'px';
            document.body.appendChild(el);
            setTimeout(() => el.remove(), 1000);
        }
        
        function showEventBanner() {
            const banner = document.getElementById('event-banner');
            if (game.eventActive) {
                banner.textContent = 'EVENTO: ' + game.activeEvent.name + ' (' + Math.ceil(game.eventTimer) + 's)';
                banner.style.display = 'block';
            } else {
                banner.style.display = 'none';
            }
        }
        
        // ==================== TABS ====================
        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                const tabName = tab.dataset.tab;
                if (tabName === 'upgrades') showUpgrades();
                if (tabName === 'missions') showMissions();
                if (tabName === 'achievements') showAchievements();
                if (tabName === 'powerups') showPowerups();
                if (tabName === 'challenges') showChallenges();
                if (tabName === 'stats') showStats();
                if (tabName === 'themes') showThemes();
            });
        });
        
        document.getElementById('tab-content').addEventListener('click', (e) => {
            const upgradeEl = e.target.closest('.upgrade-item');
            if (upgradeEl && !upgradeEl.classList.contains('disabled')) {
                buyUpgrade(parseInt(upgradeEl.dataset.upgrade));
            }
            const powerupEl = e.target.closest('.powerup-item');
            if (powerupEl) {
                activatePowerup(parseInt(powerupEl.dataset.powerup));
            }
            const themeEl = e.target.closest('.theme-item');
            if (themeEl) {
                changeTheme(themeEl.dataset.theme);
            }
        });
        
        // ==================== GAMEPLAY ====================
        function click() {
            if (game.energy <= 0) {
                showFloatingText('SIN ENERGÍA!', '#ff0000');
                return;
            }
            
            const clickValue = getClickValue();
            game.score += clickValue;
            game.totalClicks++;
            game.energy--;
            game.xp += game.level;
            game.combo++;
            game.comboTimer = 2;
            
            if (game.combo > game.stats.bestCombo) game.stats.bestCombo = game.combo;
            
            showFloatingText('+' + formatNumber(clickValue), '#ffd700');
            
            for (let i = 0; i < 3; i++) {
                createParticle();
            }
            
            checkLevel();
            checkMissions();
            checkChallenges();
            checkAchievements();
            checkDailyReset();
            checkEasterEggs();
        }
        
        function buyUpgrade(index) {
            const up = upgrades[index];
            if (game.score >= up.cost) {
                game.score -= up.cost;
                up.count++;
                up.cost = Math.floor(up.cost * 1.6);
                game.xp += 100;
                game.stats.upgradesBought++;
                checkAchievements();
                checkEasterEggs();
                if (document.querySelector('.tab.active')?.dataset.tab === 'upgrades') {
                    showUpgrades();
                }
            }
        }
        
        function checkEasterEggs() {
            easterEggs.click500.count = game.totalClicks;
            if (easterEggs.click500.count >= 500 && !easterEggs.click500.found) {
                easterEggs.click500.found = true;
                game.score += 10000;
                showFloatingText('🎉 EASTER EGG: 500 CLICS! +10K', '#ff00ff');
            }
            
            let totalUpgrades = upgrades.reduce((sum, u) => sum + u.count, 0);
            easterEggs.buyAll.count = totalUpgrades;
            if (easterEggs.buyAll.count >= 10 && !easterEggs.buyAll.found) {
                easterEggs.buyAll.found = true;
                game.score += 25000;
                showFloatingText('🎉 EASTER EGG: 10 UPGRADES! +25K', '#ff00ff');
            }
            
            if (getRank().bonus >= 2 && !easterEggs.reachRank5.found) {
                easterEggs.reachRank5.found = true;
                game.score += 50000;
                showFloatingText('🎉 EASTER EGG: DIAMANTE! +50K', '#ff00ff');
            }
        }
        
        function createParticle() {
            const clicker = document.getElementById('clicker');
            const rect = clicker.getBoundingClientRect();
            const el = document.createElement('div');
            el.style.cssText = `
                position: fixed;
                width: 8px;
                height: 8px;
                background: #00d4ff;
                border-radius: 50%;
                left: ${rect.left + rect.width/2}px;
                top: ${rect.top + rect.height/2}px;
                pointer-events: none;
            `;
            const angle = Math.random() * Math.PI * 2;
            const speed = 2 + Math.random() * 3;
            const vx = Math.cos(angle) * speed;
            const vy = Math.sin(angle) * speed;
            document.body.appendChild(el);
            
            let x = rect.left + rect.width/2;
            let y = rect.top + rect.height/2;
            let life = 1;
            
            const anim = setInterval(() => {
                x += vx;
                y += vy + 0.1;
                life -= 0.03;
                el.style.left = x + 'px';
                el.style.top = y + 'px';
                el.style.opacity = life;
                if (life <= 0) {
                    clearInterval(anim);
                    el.remove();
                }
            }, 16);
        }
        
        function checkDailyReset() {
            const now = new Date();
            const today = now.toDateString();
            const lastDay = localStorage.getItem('taprush_lastday');
            
            if (lastDay !== today) {
                dailyMissions.forEach(m => {
                    m.progress = 0;
                    m.completed = false;
                });
                dailyChallenges.forEach(c => {
                    c.progress = 0;
                    c.completed = false;
                });
                game.wheelSpins = 1;
                game.lastWheelDay = null;
                localStorage.setItem('taprush_lastday', today);
                showFloatingText('¡Nuevo día!', '#00d4ff');
            }
        }
        
        function checkChallenges() {
            dailyChallenges.forEach(c => {
                if (!c.completed) {
                    if (c.type === 'clicks') c.progress = game.totalClicks;
                    if (c.type === 'score') c.progress = game.score;
                    if (c.type === 'cps') c.progress = getCPS();
                    if (c.progress >= c.target) {
                        c.completed = true;
                        game.score += c.reward;
                        showFloatingText('¡Desafío!: ' + c.name, '#ffd700');
                    }
                }
            });
        }
        
        function spawnEvent() {
            if (Math.random() < 0.05) {
                const events = [
                    { name: '2x Puntos', multiplier: 2 },
                    { name: '3x Puntos', multiplier: 3 },
                    { name: '5x Puntos', multiplier: 5 }
                ];
                game.activeEvent = events[Math.floor(Math.random() * events.length)];
                game.eventTimer = 60;
                game.eventActive = true;
                showFloatingText('¡EVENTO: ' + game.activeEvent.name + '!', '#ff6b35');
            }
        }
        
        function spawnSpecialEvent() {
            if (Math.random() < 0.05) {
                const events = ['Lucky Hour', 'Mega Combo', 'Click Frenzy'];
                game.specialEvent = events[Math.floor(Math.random() * events.length)];
                game.specialTimer = 120;
                game.specialActive = true;
                showFloatingText('¡ESPECIAL: ' + game.specialEvent + '!', '#ff0000');
            }
        }
        
        // ==================== PRESTIGE ====================
        function prestige() {
            const prestigeScore = game.score + game.totalClicks;
            if (prestigeScore < 1000000) {
                showFloatingText('¡Necesitas 1M puntos!', '#ff0000');
                return;
            }
            game.prestige++;
            game.prestigeMult = 1 + (game.prestige * 0.1);
            game.score = 0;
            game.totalClicks = 0;
            game.level = 1;
            game.xp = 0;
            game.totalClicks = 0;
            game.level = 1;
            game.xp = 0;
            upgrades.forEach(u => u.count = 0);
            missions.forEach(m => { m.progress = 0; m.completed = false; });
            showFloatingText('¡PRESTIGIO ' + game.prestige + '!', '#ffd700');
        }
        
        document.getElementById('prestige-btn').addEventListener('click', prestige);
        
        // ==================== MAIN LOOP ====================
        function gameLoop() {
            const now = Date.now();
            const dt = 1/60;
            
            // Auto clicks
            const cps = getCPS();
            if (cps > 0) {
                game.score += cps * dt;
            }
            
            // Combo timer
            game.comboTimer -= dt;
            if (game.comboTimer <= 0) game.combo = 0;
            
            // Energy regen
            game.energyTimer += dt;
            if (game.energyTimer >= 1 && game.energy < game.maxEnergy) {
                game.energy++;
                game.energyTimer = 0;
            }
            
            // Event timer
            if (game.eventActive) {
                game.eventTimer -= dt;
                if (game.eventTimer <= 0) {
                    game.eventActive = false;
                }
            }
            
            // Spawn events
            game.eventTimer += dt;
            if (game.eventTimer >= 30) {
                spawnEvent();
                game.eventTimer = 0;
            }
            
            // Special events
            game.specialTimer += dt;
            if (game.specialTimer >= 120) {
                spawnSpecialEvent();
                game.specialTimer = 0;
            }
            
            // Powerup timers
            powerups.forEach(p => {
                if (p.active && p.timer > 0) {
                    p.timer -= dt;
                    if (p.timer <= 0) {
                        p.active = false;
                        p.timer = 0;
                        showFloatingText(p.name + ' finalizado', '#666');
                    }
                }
            });
            
            // Update UI
            updateUI();
            showEventBanner();
            
            // Auto save
            saveGame();
        }
        
        // ==================== INIT ====================
        document.getElementById('clicker').addEventListener('click', click);
        
        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') { e.preventDefault(); click(); }
            if (e.code === 'KeyU') document.querySelector('[data-tab="upgrades"]').click();
            if (e.code === 'KeyM') document.querySelector('[data-tab="missions"]').click();
            if (e.code === 'KeyA') document.querySelector('[data-tab="achievements"]').click();
            if (e.code === 'KeyP') document.querySelector('[data-tab="powerups"]').click();
            if (e.code === 'KeyD') document.querySelector('[data-tab="challenges"]').click();
            if (e.code === 'KeyS') document.querySelector('[data-tab="stats"]').click();
        });
        
        loadGame();
        showUpgrades();
        
        setInterval(gameLoop, 1000/60);
        
        saveGame();
    </script>
</body>
</html>
